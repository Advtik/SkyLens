services:
  - type: web
    name: skylens-backend
    runtime: python
    rootDir: backend
    buildCommand: python --version && python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OWM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173
      - key: ALLOWED_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: REQUEST_TIMEOUT
        value: "12"
      - key: CACHE_TTL_SECONDS
        value: "600"
      - key: DISASTER_CACHE_TTL_SECONDS
        value: "300"
